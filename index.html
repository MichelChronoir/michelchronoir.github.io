<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Michellyn | Creative AI Director</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>

    <style>
        :root {
            --primary: #a855f7;
            --secondary: #3b82f6;
            --bg: #030303;
            --card-bg: rgba(255, 255, 255, 0.03);
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #ffffff;
            --text-muted: #a1a1aa;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: none; }
        
        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Noise Texture */
        body::before {
            content: "";
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://grainy-gradients.vercel.app/noise.svg');
            opacity: 0.05; pointer-events: none; z-index: 9998;
        }

        .container { max-width: 1200px; margin: 0 auto; padding: 0 25px; }

        /* --- CUSTOM CURSOR --- */
        .cursor { width: 8px; height: 8px; background: #fff; border-radius: 50%; position: fixed; pointer-events: none; z-index: 10000; }
        .cursor-follower { width: 40px; height: 40px; border: 1px solid var(--primary); border-radius: 50%; position: fixed; pointer-events: none; z-index: 10000; transition: transform 0.15s ease-out; }

        /* --- HERO --- */
        .hero { min-height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; padding-top: 50px; }
        .gradient-text { background: linear-gradient(90deg, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* --- BENTO GRID --- */
        .section-title { font-family: 'Syne'; font-size: 3rem; text-align: center; margin: 80px 0 40px; }
        .bento-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-auto-rows: 220px;
            gap: 20px;
        }
        .bento-item { background: var(--card-bg); border: 1px solid var(--glass-border); border-radius: 30px; overflow: hidden; position: relative; transition: 0.5s; }
        .bento-item img, .bento-item video { width: 100%; height: 100%; object-fit: cover; transition: 0.5s; }
        .bento-item:hover { border-color: var(--primary); transform: translateY(-5px); }
        
        .bento-lg { grid-column: span 2; grid-row: span 2; }
        .bento-md { grid-column: span 2; grid-row: span 1; }
        
        /* --- CALCULATOR --- */
        .calc-card {
            background: var(--glass); border: 1px solid var(--glass-border);
            border-radius: 40px; padding: 50px; margin: 100px 0; backdrop-filter: blur(20px);
        }
        .calc-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 40px; align-items: center; }
        select { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); padding: 15px; border-radius: 15px; color: white; margin-top: 10px; font-size: 1rem; }
        .price-display { font-family: 'Syne'; font-size: 4rem; color: var(--primary); line-height: 1; margin: 10px 0; }

        /* --- AVATAR FIX (PENTING!) --- */
        .avatar-container { 
            position: fixed; bottom: 30px; right: 30px; z-index: 9999; 
            display: flex; flex-direction: column; align-items: flex-end;
            width: auto; height: auto; pointer-events: none;
        }
        .chat-bubble { 
            background: rgba(11, 15, 26, 0.9); backdrop-filter: blur(15px); border: 1px solid var(--primary);
            padding: 12px 20px; border-radius: 20px 20px 2px 20px; margin-bottom: 12px;
            font-size: 0.85rem; max-width: 220px; color: white; line-height: 1.4;
            opacity: 0; transition: opacity 0.4s ease; pointer-events: auto;
        }
        .avatar-img { 
            width: 85px !important; height: 85px !important; /* Ukuran dikunci */
            border-radius: 50%; border: 2px solid var(--primary); 
            cursor: pointer; background: #000; object-fit: cover;
            box-shadow: 0 10px 30px rgba(168, 85, 247, 0.4);
            pointer-events: auto; transition: 0.3s;
        }
        .avatar-img:hover { transform: scale(1.1); }

        .btn-premium { background: white; color: black; padding: 18px 35px; border-radius: 100px; font-weight: 800; font-family: 'Syne'; transition: 0.3s; text-decoration: none; display: inline-block; }
        
        @media (max-width: 768px) {
            .bento-grid { grid-template-columns: repeat(2, 1fr); }
            * { cursor: auto; } .cursor, .cursor-follower { display: none; }
            .avatar-img { width: 70px !important; height: 70px !important; }
        }
    </style>
</head>
<body>

    <div class="cursor"></div>
    <div class="cursor-follower"></div>

    <div class="container">
        <section class="hero">
            <div data-aos="zoom-out" data-aos-duration="1200">
                <h1 style="font-family: 'Syne'; font-size: clamp(3rem, 10vw, 7rem); line-height: 0.9; letter-spacing: -3px;">
                    LIMITLESS <br> <span class="gradient-text">CREATIVITY</span>
                </h1>
                <p style="color: var(--text-muted); margin: 30px auto; max-width: 600px; font-size: 1.2rem;">
                    Elevating your brand with next-gen AI visuals and cinematic storytelling.
                </p>
                <a href="#calc" class="btn-premium">GET ESTIMATE</a>
            </div>
        </section>

        <section id="portfolio">
            <h2 class="section-title" data-aos="fade-up">SELECTED WORK</h2>
            <div class="bento-grid">
                <div class="bento-item bento-lg" data-aos="fade-up">
                    <img src="Image_th90lrth90lrth90.png" alt="Character Design">
                </div>
                <div class="bento-item bento-md" data-aos="fade-up" data-aos-delay="100">
                    <img src="michellyn.png" alt="Michellyn">
                </div>
                <div class="bento-item" data-aos="fade-up" data-aos-delay="200">
                    <div style="padding: 25px; display:flex; align-items:center; height:100%; font-family:'Syne'; font-size:1.1rem;">
                        Focused on <br> Quality.
                    </div>
                </div>
                <div class="bento-item" data-aos="fade-up" data-aos-delay="300">
                    <video autoplay muted loop>
                        <source src="Video Project 3 (2).mp4" type="video/mp4">
                    </video>
                </div>
            </div>
        </section>

        <section id="calc" class="calc-card" data-aos="fade-up">
            <h2 style="font-family: 'Syne'; margin-bottom: 30px; font-size: 2.5rem;">Price <span class="gradient-text">Estimator</span></h2>
            <div class="calc-grid">
                <div>
                    <label style="font-size: 0.8rem; letter-spacing: 2px;">SERVICE CATEGORY</label>
                    <select id="serviceType" onchange="calculate()">
                        <option value="25">Character Design (Starts $25)</option>
                        <option value="40">Video AI Promotion (Starts $40)</option>
                    </select>
                </div>
                <div>
                    <label style="font-size: 0.8rem; letter-spacing: 2px;">COMPLEXITY / DURATION</label>
                    <select id="complexity" onchange="calculate()">
                        <option value="1">Standard (1 Unit / 15s)</option>
                        <option value="2">Advanced (2 Units / 30s)</option>
                        <option value="4">Premium (Group / 60s)</option>
                    </select>
                </div>
                <div style="text-align: right;">
                    <label style="font-size: 0.8rem; letter-spacing: 2px;">TOTAL ESTIMATE</label>
                    <div class="price-display">$<span id="totalPrice">25</span></div>
                    <a href="https://wa.me/6283181216914" class="btn-premium" style="font-size: 0.7rem; padding: 12px 25px;">ORDER VIA WA</a>
                </div>
            </div>
        </section>
    </div>

    <div class="avatar-container">
        <div class="chat-bubble" id="chatBox"></div>
        <img src="pose1.png" id="avatarImg" class="avatar-img" onclick="document.getElementById('calc').scrollIntoView()">
    </div>

    <script>
        AOS.init();

        // Custom Cursor
        const cursor = document.querySelector('.cursor');
        const follower = document.querySelector('.cursor-follower');
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
            follower.style.transform = `translate(${e.clientX - 20}px, ${e.clientY - 20}px)`;
        });

        // Price Calc
        function calculate() {
            const base = document.getElementById('serviceType').value;
            const multi = document.getElementById('complexity').value;
            document.getElementById('totalPrice').innerText = base * multi;
        }

        // Avatar Logic
        const convos = [
            { t: "Halo! Butuh estimasi harga cepat? Coba kalkulator di samping! 💎", p: "pose1.png" },
            { t: "Desain karakter & video promosi novel ada di sini. 📚", p: "pose2.png" },
            { t: "Konsultasi itu gratis lho, klik fotoku buat chat! 😉", p: "pose4.png" }
        ];

        let idx = 0;
        const chatBox = document.getElementById('chatBox');
        const avatarImg = document.getElementById('avatarImg');

        function typeWriter(text, i, cb) {
            if (i < text.length) {
                chatBox.innerHTML = text.substring(0, i+1);
                setTimeout(() => typeWriter(text, i + 1, cb), 40);
            } else { setTimeout(cb, 3000); }
        }

        function startConvo() {
            chatBox.style.opacity = "1";
            const data = convos[idx];
            avatarImg.src = data.p;
            
            typeWriter(data.t, 0, () => {
                chatBox.style.opacity = "0";
                idx = (idx + 1) % convos.length;
                setTimeout(startConvo, 1000);
            });
        }
        window.onload = startConvo;
    </script>
</body>
</html>
