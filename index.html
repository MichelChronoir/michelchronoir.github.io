<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Michellyn | Creative AI Director</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>

    <style>
        :root {
            --primary: #a855f7;
            --secondary: #3b82f6;
            --bg: #030303;
            --card-bg: rgba(255, 255, 255, 0.03);
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #ffffff;
            --text-muted: #a1a1aa;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: none; }
        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        /* --- NOISE TEXTURE OVERLAY --- */
        body::before {
            content: "";
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://grainy-gradients.vercel.app/noise.svg');
            opacity: 0.05; pointer-events: none; z-index: 9998;
        }

        .container { max-width: 1200px; margin: 0 auto; padding: 0 25px; }

        /* --- CUSTOM CURSOR --- */
        .cursor { width: 10px; height: 10px; background: #fff; border-radius: 50%; position: fixed; pointer-events: none; z-index: 9999; transition: transform 0.1s; }
        .cursor-follower { width: 40px; height: 40px; border: 1px solid var(--primary); border-radius: 50%; position: fixed; pointer-events: none; z-index: 9999; transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        /* --- BENTO GRID PORTFOLIO --- */
        .bento-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-auto-rows: 200px;
            gap: 20px;
            margin-top: 50px;
        }

        .bento-item {
            position: relative;
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            overflow: hidden;
            transition: 0.5s;
        }

        .bento-item img { width: 100%; height: 100%; object-fit: cover; opacity: 0.7; transition: 0.5s; }
        .bento-item:hover img { opacity: 1; transform: scale(1.05); }
        
        .bento-1 { grid-column: span 2; grid-row: span 2; } /* Box Besar */
        .bento-2 { grid-column: span 2; grid-row: span 1; }
        .bento-3 { grid-column: span 1; grid-row: span 1; }
        .bento-4 { grid-column: span 1; grid-row: span 2; }

        /* --- INTERACTIVE CALCULATOR --- */
        .calc-card {
            background: linear-gradient(145deg, rgba(168, 85, 247, 0.05), rgba(59, 130, 246, 0.05));
            border: 1px solid var(--glass-border);
            border-radius: 40px;
            padding: 40px;
            margin: 100px 0;
            backdrop-filter: blur(10px);
        }

        .calc-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 30px; }
        
        select, input {
            width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border);
            padding: 15px; border-radius: 15px; color: white; margin-top: 10px; outline: none;
        }

        .price-display {
            font-family: 'Syne'; font-size: 3.5rem; color: var(--primary);
            text-shadow: 0 0 30px rgba(168, 85, 247, 0.3);
        }

        /* --- AVATAR & TYPING --- */
        .avatar-container { position: fixed; bottom: 30px; right: 30px; z-index: 9999; display: flex; flex-direction: column; align-items: flex-end; }
        .chat-bubble { 
            background: var(--glass); backdrop-filter: blur(20px); border: 1px solid var(--glass-border);
            padding: 15px 25px; border-radius: 30px 30px 5px 30px; margin-bottom: 15px;
            font-size: 0.95rem; max-width: 280px; box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }
        .avatar-img { width: 80px; height: 80px; border-radius: 50%; border: 2px solid var(--primary); transition: 0.3s; }

        .btn-premium {
            background: white; color: black; padding: 18px 35px; border-radius: 100px;
            font-weight: 800; font-family: 'Syne'; transition: 0.3s; display: inline-block;
        }
        .btn-premium:hover { transform: scale(1.05); box-shadow: 0 0 30px rgba(255,255,255,0.2); }

    </style>
</head>
<body>

    <div class="cursor"></div>
    <div class="cursor-follower"></div>

    <div class="container">
        <section class="hero" style="min-height: 90vh; display: flex; align-items: center; justify-content: center; text-align: center;">
            <div data-aos="zoom-out" data-aos-duration="1500">
                <h1 style="font-family: 'Syne'; font-size: clamp(3rem, 10vw, 7rem); line-height: 0.85; letter-spacing: -4px;">
                    FUTURE <br> <span class="gradient-text">VISUALS</span>
                </h1>
                <p style="color: var(--text-muted); margin: 30px auto; max-width: 600px; font-size: 1.2rem;">
                    Michellyn Studio menggabungkan estetika artistik dengan kecerdasan buatan untuk menciptakan standar baru dalam desain digital.
                </p>
                <a href="#calc" class="btn-premium">GET ESTIMATE</a>
            </div>
        </section>

        <section id="portfolio">
            <h2 class="section-title" data-aos="fade-up">SELECTED WORK</h2>
            <div class="bento-grid">
                <div class="bento-item bento-1" data-aos="fade-up">
                    <img src="Image_th90lrth90lrth90.png" alt="Hero Project">
                    <div style="position: absolute; bottom: 30px; left: 30px;">
                        <span class="feature-tag" style="background: white; color: black;">FEATURED</span>
                        <h3 style="font-family: 'Syne'; font-size: 1.5rem; margin-top: 10px;">Character Synthesis</h3>
                    </div>
                </div>
                <div class="bento-item bento-2" data-aos="fade-up" data-aos-delay="100">
                    <img src="michellyn.png" alt="Profile">
                </div>
                <div class="bento-item bento-3" data-aos="fade-up" data-aos-delay="200">
                    <div style="padding: 30px; display: flex; align-items: center; height: 100%;">
                        <p style="font-family: 'Syne'; font-size: 1.2rem;">"The next generation of AI Art."</p>
                    </div>
                </div>
                <div class="bento-item bento-4" data-aos="fade-up" data-aos-delay="300">
                    <video autoplay muted loop style="width: 100%; height: 100%; object-fit: cover;">
                        <source src="Video Project 3 (2).mp4" type="video/mp4">
                    </video>
                </div>
            </div>
        </section>

        <section id="calc" class="calc-card" data-aos="fade-up">
            <h2 style="font-family: 'Syne'; margin-bottom: 40px; font-size: 2.5rem;">Price <span class="gradient-text">Estimator</span></h2>
            <div class="calc-grid">
                <div>
                    <label>SERVICE TYPE</label>
                    <select id="serviceType" onchange="calculate()">
                        <option value="25">Character Design ($25+)</option>
                        <option value="40">AI Video Promo ($40+)</option>
                    </select>
                </div>
                <div>
                    <label>QUANTITY / DURATION</label>
                    <select id="complexity" onchange="calculate()">
                        <option value="1">Standard (1 Unit / 15s)</option>
                        <option value="2">Advanced (2 Units / 30s)</option>
                        <option value="4">Premium (Grup / 60s)</option>
                    </select>
                </div>
                <div style="text-align: right;">
                    <label>ESTIMATED TOTAL</label>
                    <div class="price-display">$<span id="totalPrice">25</span></div>
                    <a href="https://wa.me/6283181216914" class="btn-premium" style="margin-top: 20px; font-size: 0.8rem; padding: 12px 25px;">ORDER NOW</a>
                </div>
            </div>
        </section>
    </div>

    <div class="avatar-container">
        <div class="chat-bubble"><span id="avatarChat"></span></div>
        <img src="pose1.png" id="avatarImg" class="avatar-img">
    </div>

    <script>
        AOS.init();

        // --- CURSOR LOGIC ---
        const cursor = document.querySelector('.cursor');
        const follower = document.querySelector('.cursor-follower');
        document.addEventListener('mousemove', (e) => {
            cursor.style.transform = `translate(${e.clientX}px, ${e.clientY}px)`;
            follower.style.transform = `translate(${e.clientX - 15}px, ${e.clientY - 15}px)`;
        });

        // --- CALCULATOR LOGIC ---
        function calculate() {
            const base = document.getElementById('serviceType').value;
            const multiplier = document.getElementById('complexity').value;
            const total = base * multiplier;
            document.getElementById('totalPrice').innerText = total;
        }

        // --- AVATAR TYPING ---
        const conversations = [
            { text: "Coba kalkulator harganya, transparan & jujur! 💎", pose: "pose1.png" },
            { text: "Bento grid di atas adalah karya-karya terbaikku. 🎨", pose: "pose2.png" },
            { text: "Butuh custom project? Chat aja, aku nggak gigit! 😂", pose: "pose3.png" }
        ];

        let curIdx = 0;
        const chatText = document.getElementById('avatarChat');
        const chatImg = document.getElementById('avatarImg');

        function typeEffect(text, i, cb) {
            if (i < text.length) {
                chatText.innerHTML = text.substring(0, i+1);
                setTimeout(() => typeEffect(text, i + 1, cb), 40);
            } else { setTimeout(cb, 3000); }
        }

        function rotateChat() {
            const data = conversations[curIdx];
            chatImg.src = data.pose;
            typeEffect(data.text, 0, () => {
                curIdx = (curIdx + 1) % conversations.length;
                rotateChat();
            });
        }
        rotateChat();
    </script>
</body>
</html>
